device: 'cuda'

data:
  train_path: './train.json'
  val_path: './val.json'

model:
  hidden_dim: 256
  output_dim: 512
  dropout: 0.3

training:
  num_epochs: 8
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  num_workers: 4

checkpoint_dir: 'checkpoints'
log_dir: 'logs'